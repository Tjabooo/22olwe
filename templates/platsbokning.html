<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/platsbokning.css?v=1">
    <title>Platsbokning</title>
</head>
<body class="dark-mode">
    <header>
        <h1>SJ Platsbokning</h1>
    </header>
    <main>
        <div class="center">
            <div class="action">
                <form method="POST" action="/platsbokning/book_ticket">
                    <button type="submit">Boka biljett</button>
                </form>
            </div>
            <br>
            <div class="action">
                <button id="cancel_ticket">Avboka biljett</button>
            </div>
            <br>
            <div class="action">
                <button id="print_tickets">Skriv ut biljetter</button>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script type="module" src="/static/cogs/buttonEvents.js"></script>
</body>
</html>
